name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Build, Test & Coverage (${{ matrix.tfm }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tfm: [net8.0, net9.0, net10.0]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore JsonLinq.slnx

      - name: Build
        run: dotnet build JsonLinq.slnx --configuration Release --no-restore

      - name: Test with coverage
        run: >
          dotnet test tests/JsonLinq.Tests/JsonLinq.Tests.csproj
          --configuration Release
          --no-build
          --framework ${{ matrix.tfm }}
          --collect:"XPlat Code Coverage"
          --results-directory TestResults

      - name: Generate coverage report
        run: >
          dotnet reportgenerator
          -reports:"TestResults/**/coverage.cobertura.xml"
          -targetdir:coverage-report
          -reporttypes:"Html;MarkdownSummaryGithub;Cobertura"

      - name: Write coverage summary to job summary
        run: cat coverage-report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.tfm }}
          path: coverage-report/
          retention-days: 14