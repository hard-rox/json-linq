name: Performance Benchmarks

on:
  schedule:
    - cron: '0 2 * * 1'  # Weekly Monday 2 AM UTC
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/JsonLinq/**'
      - 'benchmarks/**'
      - '.github/workflows/benchmark.yml'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore JsonLinq.slnx

      - name: Build
        run: dotnet build benchmarks/JsonLinq.Benchmarks/JsonLinq.Benchmarks.csproj -c Release --no-restore

      - name: Run Benchmarks
        run: |
          cd benchmarks/JsonLinq.Benchmarks
          dotnet run -c Release --no-build
        continue-on-error: true

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/JsonLinq.Benchmarks/BenchmarkDotNet.Artifacts/
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultsPath = 'benchmarks/JsonLinq.Benchmarks/BenchmarkDotNet.Artifacts/results';
            if (!fs.existsSync(resultsPath)) {
              core.info('No benchmark results found');
              return;
            }
            
            const results = fs.readdirSync(resultsPath)
              .filter(f => f.endsWith('.json'))
              .map(f => `- 📊 ${f}`);
            
            if (results.length > 0) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## Performance Benchmarks\n\nBenchmark results available:\n${results.join('\n')}\n\nView detailed results in the workflow artifacts.`
              });
            }
